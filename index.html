<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Weighted Hug | Pitch & Plan</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; margin: 0; overflow: hidden; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // Simple Lucide Icon Wrapper for CDN usage
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const App = () => {
            const [activeSection, setActiveSection] = useState('pitch'); 
            const [currentSlide, setCurrentSlide] = useState(0);
            const [showDonateModal, setShowDonateModal] = useState(false);
            const canvasRef = useRef(null);

            useEffect(() => {
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let animationFrameId;

                const handleResize = () => {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                };

                window.addEventListener('resize', handleResize);
                handleResize();

                const particles = [];
                for (let i = 0; i < 200; i++) {
                    particles.push({
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        size: Math.random() * 2 + 0.5,
                        speedY: Math.random() * 0.5 + 0.2,
                        opacity: Math.random() * 0.4 + 0.1
                    });
                }

                const animate = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    ctx.fillStyle = '#020617';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => {
                        p.y += p.speedY;
                        if (p.y > canvas.height) p.y = -10;
                        ctx.fillStyle = `rgba(255, 255, 255, ${p.opacity})`;
                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fill();
                    });
                    animationFrameId = requestAnimationFrame(animate);
                };
                animate();
                return () => {
                    window.removeEventListener('resize', handleResize);
                    cancelAnimationFrame(animationFrameId);
                };
            }, []);

            const slides = [
                { id: 1, content: <Slide1 /> },
                { id: 2, content: <Slide2 /> },
                { id: 3, content: <Slide3 /> },
                { id: 4, content: <Slide4 /> },
                { id: 5, content: <Slide5 /> },
                { id: 6, content: <Slide6 /> },
                { id: 7, content: <Slide7 /> },
                { id: 8, content: <Slide8 /> },
                { id: 9, content: <Slide9 /> },
                { id: 10, content: <Slide10 /> },
                { id: 11, content: <Slide11 /> }
            ];

            return (
                <div className="relative h-screen w-full text-slate-100 flex flex-col select-none">
                    <canvas ref={canvasRef} />
                    
                    <nav className="relative z-50 bg-slate-950/80 backdrop-blur-xl border-b border-white/5 px-6 py-4 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                                <Icon name="heart" size={20} className="text-white fill-current" />
                            </div>
                            <span className="font-black uppercase tracking-tighter text-base italic">The Weighted Hug</span>
                        </div>
                        
                        <div className="flex bg-slate-900/80 rounded-2xl p-1 border border-white/10">
                            {['pitch', 'business_plan', 'advertisement'].map(id => (
                                <button
                                    key={id}
                                    onClick={() => { setActiveSection(id); setCurrentSlide(0); }}
                                    className={`px-4 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all ${activeSection === id ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:text-white'}`}
                                >
                                    {id.replace('_', ' ')}
                                </button>
                            ))}
                        </div>

                        <button onClick={() => setShowDonateModal(true)} className="bg-emerald-600 hover:bg-emerald-500 text-white px-6 py-2 rounded-xl text-xs font-black uppercase tracking-wider transition-all">
                            Donate Now :)
                        </button>
                    </nav>

                    <main className="relative z-10 flex-grow flex flex-col items-center overflow-hidden p-4">
                        <div className="w-full max-w-6xl h-full flex flex-col">
                            {activeSection === 'pitch' && (
                                <div className="h-full flex flex-col items-center">
                                    <div className="w-full flex-grow bg-slate-900/40 backdrop-blur-md border border-white/10 rounded-[3rem] p-8 flex items-center justify-center relative overflow-hidden mb-4">
                                        <div className="absolute top-0 left-0 w-full p-6 flex gap-2 justify-center z-20">
                                            {slides.map((_, idx) => (
                                                <div key={idx} className={`h-1 rounded-full transition-all duration-500 ${idx <= currentSlide ? 'bg-indigo-500 w-10' : 'bg-white/10 w-3'}`} />
                                            ))}
                                        </div>
                                        <div className="w-full h-full flex items-center justify-center overflow-y-auto custom-scrollbar pt-12">
                                            {slides[currentSlide].content}
                                        </div>
                                    </div>
                                    <div className="flex items-center gap-8 bg-slate-900/90 px-8 py-3 rounded-full border border-white/10 shadow-2xl mb-4">
                                        <button onClick={() => setCurrentSlide(p => Math.max(0, p-1))} className="disabled:opacity-20" disabled={currentSlide === 0}><Icon name="chevron-left" /></button>
                                        <div className="font-black tracking-widest font-mono text-indigo-400">{String(currentSlide + 1).padStart(2, '0')} / {slides.length}</div>
                                        <button onClick={() => setCurrentSlide(p => Math.min(slides.length-1, p+1))} className="disabled:opacity-20" disabled={currentSlide === slides.length - 1}><Icon name="chevron-right" /></button>
                                    </div>
                                </div>
                            )}
                            {activeSection === 'business_plan' && <div className="h-full overflow-y-auto custom-scrollbar"><BusinessPlan /></div>}
                            {activeSection === 'advertisement' && <div className="h-full flex items-center justify-center overflow-y-auto custom-scrollbar"><NewspaperAd /></div>}
                        </div>
                    </main>

                    {showDonateModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6">
                            <div className="absolute inset-0 bg-slate-950/95" onClick={() => setShowDonateModal(false)} />
                            <div className="relative bg-slate-900 border border-white/10 p-10 rounded-[3rem] w-full max-w-md shadow-2xl">
                                <h2 className="text-3xl font-black uppercase italic text-emerald-400 text-center mb-8">Donate Now :)</h2>
                                <div className="space-y-4">
                                    <a href="https://cash.app/$LaRrYKoOPA07" target="_blank" className="block p-6 bg-white/5 border border-white/10 rounded-3xl hover:bg-indigo-600 transition-all">
                                        <p className="text-[10px] font-black uppercase text-indigo-400 mb-1">Founder & CEO</p>
                                        <p className="text-xl font-black italic">Bryce - $LaRrYKoOPA07</p>
                                    </a>
                                    <a href="https://cash.app/$pcxclipz" target="_blank" className="block p-6 bg-white/5 border border-white/10 rounded-3xl hover:bg-indigo-600 transition-all">
                                        <p className="text-[10px] font-black uppercase text-indigo-400 mb-1">Developer</p>
                                        <p className="text-xl font-black italic">Brandon - $pcxclipz</p>
                                    </a>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const Slide1 = () => (
            <div className="text-center space-y-12 w-full">
                <h1 className="text-7xl md:text-9xl font-black tracking-tighter uppercase italic leading-none">THE WEIGHTED <br/><span className="text-indigo-500">HUG.</span></h1>
                <div className="flex justify-center gap-12 pt-8">
                    <div className="text-center"><div className="text-4xl font-black">$150,000</div><div className="text-[10px] uppercase font-black text-indigo-400 mt-2">Investment Goal</div></div>
                    <div className="w-px h-12 bg-white/10" />
                    <div className="text-center"><div className="text-4xl font-black">10%</div><div className="text-[10px] uppercase font-black text-indigo-400 mt-2">Equity Stake</div></div>
                </div>
            </div>
        );

        const Slide2 = () => (
            <div className="grid md:grid-cols-2 gap-12 items-center w-full max-w-5xl text-left">
                <div className="space-y-6">
                    <h3 className="text-4xl font-black uppercase italic">The Market Gap</h3>
                    <p className="text-slate-400 leading-relaxed font-medium">Existing weighted blankets are sold as "luxury" items reaching $400. This creates an <strong>Anxiety Tax</strong> for those who need relief most.</p>
                    <div className="p-4 bg-indigo-600/10 border border-indigo-500/20 rounded-2xl flex justify-between items-center">
                        <span className="text-[10px] font-black uppercase tracking-widest text-indigo-400">Our Targeted MSRP</span>
                        <span className="text-2xl font-black">$49.99</span>
                    </div>
                </div>
                <div className="bg-slate-900 border border-white/10 p-12 rounded-[3rem] text-center shadow-2xl">
                    <div className="text-8xl font-black text-indigo-400 italic">82%</div>
                    <p className="text-[10px] font-black uppercase opacity-40 mt-4 tracking-widest">Cost is the #1 barrier to clinical tools.</p>
                </div>
            </div>
        );

        const Slide3 = () => (
            <div className="space-y-12 text-center w-full">
                <h3 className="text-4xl font-black uppercase italic">Our Disruption</h3>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    {["Material Innovation", "Logistics Engine", "Assembly Logic"].map((t, i) => (
                        <div key={i} className="bg-white/5 p-8 rounded-[2.5rem] border border-white/10">
                            <h4 className="text-[10px] font-black uppercase tracking-widest mb-4 italic text-indigo-400">{t}</h4>
                            <p className="text-[11px] text-slate-400 leading-relaxed font-medium">Proprietary sourcing and flat-pack delivery systems.</p>
                        </div>
                    ))}
                </div>
            </div>
        );

        const Slide4 = () => (
            <div className="grid md:grid-cols-2 gap-12 items-center w-full max-w-5xl text-left">
                <div className="space-y-6">
                    <h3 className="text-4xl font-black uppercase italic">The Product</h3>
                    <div className="space-y-3">
                        {["Bamboo Cooling Shell", "High-Density Micro-Beads", "Calibration Kit"].map((t, i) => (
                            <div key={i} className="p-4 bg-white/5 rounded-2xl border border-white/10 flex gap-4 items-center">
                                <Icon name="check-circle-2" className="text-indigo-400" />
                                <p className="font-black italic">{t}</p>
                            </div>
                        ))}
                    </div>
                </div>
                <div className="aspect-square bg-indigo-600 rounded-[4rem] p-12 flex items-center justify-center text-center shadow-2xl">
                    <h4 className="text-3xl font-black italic uppercase leading-tight tracking-tighter">"The hug you <br/>build yourself."</h4>
                </div>
            </div>
        );

        const Slide5 = () => (
            <div className="space-y-12 w-full max-w-5xl text-center">
                <h3 className="text-4xl font-black uppercase italic">Economics</h3>
                <div className="grid md:grid-cols-2 gap-8">
                    <div className="p-10 bg-indigo-500/5 border border-indigo-500/20 rounded-[3rem]">
                        <div className="text-7xl font-black text-indigo-400 italic">$49.99</div>
                        <p className="text-[11px] font-black uppercase tracking-widest opacity-60 mt-4">Entry Level MSRP</p>
                    </div>
                    <div className="bg-indigo-600 p-10 rounded-[3rem] text-white">
                        <div className="text-7xl font-black italic">52%</div>
                        <p className="text-[11px] font-black uppercase tracking-widest opacity-60 mt-4">Net Profit Margin</p>
                    </div>
                </div>
            </div>
        );

        const Slide6 = () => (
            <div className="space-y-12 text-center w-full">
                <h3 className="text-4xl font-black uppercase italic">Scaling Channels</h3>
                <div className="grid grid-cols-2 gap-8 max-w-4xl mx-auto">
                    <div className="p-8 bg-white/5 border border-white/10 rounded-3xl">
                        <Icon name="zap" size={40} className="mx-auto mb-4 text-indigo-400" />
                        <h4 className="font-black italic uppercase">Organic Viral</h4>
                    </div>
                    <div className="p-8 bg-white/5 border border-white/10 rounded-3xl">
                        <Icon name="users" size={40} className="mx-auto mb-4 text-indigo-400" />
                        <h4 className="font-black italic uppercase">Clinician Referrals</h4>
                    </div>
                </div>
            </div>
        );

        const Slide7 = () => (
            <div className="text-center w-full max-w-5xl">
                <h3 className="text-4xl font-black uppercase italic mb-12">Social Impact</h3>
                <div className="bg-indigo-600 p-16 rounded-[4rem] text-white">
                    <h4 className="text-7xl font-black tracking-tighter italic mb-4">HUG FOR HUG.</h4>
                    <p className="text-xl italic opacity-80">We donate 1 kit for every 10 sold to children's hospitals.</p>
                </div>
            </div>
        );

        const Slide8 = () => (
            <div className="grid md:grid-cols-2 gap-12 items-center w-full max-w-5xl text-left">
                <div className="space-y-6">
                    <h3 className="text-5xl font-black uppercase italic">Exit Strategy</h3>
                    <p className="text-slate-400 leading-relaxed font-medium">Acquisition within 48 months by CPG giant or Healthcare conglomerate.</p>
                </div>
                <div className="space-y-4">
                    {["CPG Giant (P&G / Unilever)", "Private Equity (Wellness)", "Retail Strategic (CVS)"].map((t, i) => (
                        <div key={i} className="p-5 bg-white/5 border border-white/10 rounded-2xl flex justify-between items-center">
                            <p className="font-black italic">{t}</p>
                            <Icon name="external-link" size={16} className="opacity-40" />
                        </div>
                    ))}
                </div>
            </div>
        );

        const Slide9 = () => (
            <div className="space-y-8 w-full max-w-5xl text-center">
                <h3 className="text-4xl font-black uppercase italic">Founding Team</h3>
                <div className="flex justify-center gap-12">
                    <div className="p-8 bg-slate-900 border border-white/10 rounded-3xl w-64">
                        <div className="text-2xl font-black italic">Bryce</div>
                        <div className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mt-1">Founder & CEO</div>
                    </div>
                    <div className="p-8 bg-slate-900 border border-white/10 rounded-3xl w-64">
                        <div className="text-2xl font-black italic">Brandon</div>
                        <div className="text-[10px] font-black text-indigo-400 uppercase tracking-widest mt-1">Developer</div>
                    </div>
                </div>
            </div>
        );

        const Slide10 = () => (
            <div className="text-center space-y-12">
                <h3 className="text-4xl font-black uppercase italic">The Future</h3>
                <h2 className="text-8xl font-black tracking-tighter italic text-indigo-500 uppercase">Sensory For All.</h2>
            </div>
        );

        const Slide11 = () => (
            <div className="w-full max-w-5xl space-y-8">
                <h3 className="text-5xl font-black uppercase italic text-center mb-12">Resources</h3>
                <div className="grid grid-cols-2 gap-6">
                    <div className="bg-white/5 border border-white/10 p-8 rounded-3xl">
                        <h4 className="text-indigo-400 font-black uppercase text-xs mb-4">Scientific Studies</h4>
                        <p className="text-[11px] text-slate-400 leading-relaxed italic">• Harvard Health: Deep Pressure Benefits<br/>• AJOT: Sensory Integration Tools</p>
                    </div>
                    <div className="bg-white/5 border border-white/10 p-8 rounded-3xl">
                        <h4 className="text-indigo-400 font-black uppercase text-xs mb-4">Market Data</h4>
                        <p className="text-[11px] text-slate-400 leading-relaxed italic">• Grand View Research 2025 Reports<br/>• Statista: Wellness Consumption</p>
                    </div>
                </div>
            </div>
        );

        const BusinessPlan = () => (
            <div className="space-y-16 pb-24 px-4 max-w-4xl mx-auto pt-10">
                <h1 className="text-7xl font-black tracking-tighter uppercase italic text-indigo-500">Business Plan.</h1>
                <section className="space-y-6">
                    <h2 className="text-xs font-black uppercase tracking-widest text-indigo-400">01. Executive Summary</h2>
                    <p className="bg-slate-900/40 p-10 rounded-[3rem] border border-white/5 text-sm leading-relaxed text-slate-300">
                        The Weighted Hug is a DTC brand engineering the first affordable sensory therapy ecosystem. By decentralizing assembly, we reduce logistics overhead by 82%, allowing for premium materials at low price points.
                    </p>
                </section>
                <section className="space-y-6">
                    <h2 className="text-xs font-black uppercase tracking-widest text-indigo-400">02. Market Problem</h2>
                    <p className="bg-slate-900/40 p-10 rounded-[3rem] border border-white/5 text-sm leading-relaxed text-slate-300">
                        Sensory relief is currently gated by high luxury pricing. We break that barrier with a DIY kit model that puts therapeutic agency back in the hands of the patient.
                    </p>
                </section>
            </div>
        );

        const NewspaperAd = () => (
            <div className="w-full max-w-2xl bg-[#1a1a15] p-12 text-[#f4f1ea] shadow-2xl border border-white/10 relative">
                <div className="border-b-[4px] border-[#f4f1ea] pb-4 text-center">
                    <h4 className="text-6xl font-serif font-black tracking-tighter uppercase italic">The Gazette</h4>
                    <div className="flex justify-between text-[10px] font-bold uppercase tracking-[0.3em] mt-3">
                        <span>VOL. XII • ISSUE 04</span>
                        <span>SUNDAY, MARCH 15, 2026</span>
                    </div>
                </div>
                <div className="grid grid-cols-1 gap-10 pt-10">
                    <h5 className="text-8xl font-black leading-[0.8] tracking-tighter uppercase italic">HEAVY<br/><span className="text-indigo-400">PEACE.</span></h5>
                    <p className="text-2xl font-serif italic border-l-[8px] border-indigo-400 pl-6 leading-tight font-black">
                        "Tranquility is no longer a luxury reserved for the few."
                    </p>
                    <div className="bg-indigo-600/10 border border-indigo-500/30 p-8 text-center rounded-2xl mt-4">
                        <div className="text-6xl font-black text-indigo-400 tracking-tighter leading-none">$49.99</div>
                        <p className="text-[10px] font-black uppercase mt-4 tracking-widest">WEIGHTEDHUG.COM</p>
                    </div>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
